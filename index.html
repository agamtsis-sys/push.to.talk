<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Income Calculator</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 { text-align: center; color: var(--primary); }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        .button-stack {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-add { background-color: var(--primary); color: white; }
        .btn-done { background-color: #10b981; color: white; }
        button:hover { opacity: 0.9; }

        /* Table Styles */
        .table-container {
            margin-top: 2rem;
            overflow-x: auto; /* Enables mobile scrolling */
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background-color: #f1f5f9; }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container { padding: 1rem; }
            .button-stack { flex-direction: column; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Income Tracker</h2>
    
    <div id="form-section">
        <div class="input-group">
            <label for="empName">Employee Name</label>
            <input type="text" id="empName" placeholder="Enter name...">
        </div>
        
        <div class="input-group">
            <label for="empIncome">Monthly Income (₹)</label>
            <input type="number" id="empIncome" placeholder="e.g. 30000">
        </div>

        <div class="button-stack">
            <button class="btn-add" onclick="addEmployee()">Add Another</button>
            <button class="btn-done" onclick="showFinalTable()">Done / Generate Table</button>
        </div>
    </div>

    <div id="table-section" class="table-container">
        <h3>Final Summary</h3>
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Monthly (₹)</th>
                    <th>Per Day (₹)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button style="margin-top: 20px; background: var(--secondary); color: white;" onclick="location.reload()">Reset</button>
    </div>
</div>

<script>
    let employees = [];

    function addEmployee() {
        const nameInput = document.getElementById('empName');
        const incomeInput = document.getElementById('empIncome');

        if (nameInput.value === "" || incomeInput.value === "") {
            alert("Please fill in both fields");
            return;
        }

        const income = parseFloat(incomeInput.value);
        const perDay = income / 30;

        employees.push({
            name: nameInput.value,
            monthly: income,
            daily: perDay.toFixed(2)
        });

        // Clear inputs for next entry
        nameInput.value = "";
        incomeInput.value = "";
        nameInput.focus();
        
        alert("Employee added successfully!");
    }

    function showFinalTable() {
        // If they filled the current inputs but didn't click "Add", catch it here
        const nameInput = document.getElementById('empName').value;
        const incomeInput = document.getElementById('empIncome').value;
        
        if (nameInput !== "" && incomeInput !== "") {
            const confirmAdd = confirm("Add the current entry before finishing?");
            if (confirmAdd) {
                const income = parseFloat(incomeInput);
                employees.push({
                    name: nameInput,
                    monthly: income,
                    daily: (income / 30).toFixed(2)
                });
            }
        }

        if (employees.length === 0) {
            alert("No data to show!");
            return;
        }

        const tbody = document.querySelector('#resultsTable tbody');
        tbody.innerHTML = ""; // Clear old data

        employees.forEach(emp => {
            const row = `<tr>
                <td>${emp.name}</td>
                <td>₹${emp.monthly.toLocaleString('en-IN')}</td>
                <td>₹${parseFloat(emp.daily).toLocaleString('en-IN')}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('form-section').style.display = 'none';
        document.getElementById('table-section').style.display = 'block';
    }
</script>

</body>
</html>
