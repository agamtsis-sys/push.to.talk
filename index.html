<!DOCTYPE html>
<html>
<head>
  <title>Walkie Talkie Pro</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:30px;">
 
<h1>📡 Walkie Talkie Pro</h1>
 
<h3>Your ID:</h3>
<p id="myid">...</p>
 
<input id="customid" placeholder="Set your ID">
<button onclick="setID()">Set ID</button>
 
<h3>Status:</h3>
<p id="status">❌ Not connected</p>
 
<input id="connectid" placeholder="Enter other ID">
<button onclick="connect()">Connect</button>
 
<br><br>
 
<!-- 🔴🟢 LIGHT -->
<div id="light" style="width:30px;height:30px;border-radius:50%;background:red;margin:auto;"></div>
 
<br>
 
<button 
  onmousedown="startRecording()" 
  onmouseup="stopRecording()"
  ontouchstart="startRecording()" 
  ontouchend="stopRecording()"
  style="padding:20px;font-size:18px;">
  🎤 HOLD TO TALK
</button>
 
<h3>📥 Received / Queue</h3>
<ul id="queueList"></ul>
 
<script>
let peer;
let conn = null;
 
let mediaRecorder;
let audioChunks = [];
 
let queue = [];
let isPlaying = false;
let counter = 1;
 
// 🔧 CREATE PEER
function createPeer(id=null) {
  peer = new Peer(id);
 
  peer.on('open', id => {
    document.getElementById("myid").innerText = id;
  });
 
  // Incoming connection
  peer.on('connection', connection => {
    conn = connection;
 
    conn.on('open', () => {
      document.getElementById("status").innerText = "✅ Connected";
      setupConnection();
    });
 
    conn.on('close', () => {
      document.getElementById("status").innerText = "❌ Disconnected";
      conn = null;
    });
  });
}
 
// SET CUSTOM ID
function setID() {
  let id = document.getElementById("customid").value;
  if (!id) return alert("Enter ID");
 
  if (peer) peer.destroy();
 
  createPeer(id);
  document.getElementById("status").innerText = "❌ Not connected";
}
 
// CONNECT TO OTHER DEVICE
function connect() {
  let id = document.getElementById("connectid").value;
  if (!id) return alert("Enter other ID");
 
  conn = peer.connect(id);
 
  conn.on('open', () => {
    document.getElementById("status").innerText = "✅ Connected";
    setupConnection();
  });
 
  conn.on('error', err => {
    console.error(err);
    document.getElementById("status").innerText = "❌ Connection error";
  });
 
  conn.on('close', () => {
    document.getElementById("status").innerText = "❌ Disconnected";
    conn = null;
  });
}
 
// HANDLE DATA
function setupConnection() {
  conn.on('data', data => {
    addToQueue(data);
  });
}
 
// ADD TO QUEUE + UI
function addToQueue(blob) {
  queue.push(blob);
 
  let li = document.createElement("li");
  li.innerText = "Message " + counter++;
  document.getElementById("queueList").appendChild(li);
 
  playQueue();
}
 
// PLAY QUEUE
function playQueue() {
  if (isPlaying || queue.length === 0) return;
 
  isPlaying = true;
 
  const blob = queue.shift();
  const audio = new Audio(URL.createObjectURL(blob));
 
  audio.onended = () => {
    isPlaying = false;
    playQueue();
  };
 
  audio.play().catch(() => {
    // iPhone fix
    document.body.onclick = () => audio.play();
  });
}
 
// 🎤 START RECORD
async function startRecording() {
  if (!conn) {
    alert("No connection!");
    return;
  }
 
  if (conn.open !== true) {
    alert("Still connecting... wait a sec");
    return;
  }
 
  document.getElementById("light").style.background = "green";
 
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
 
  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];
 
  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };
 
  mediaRecorder.start();
 
  beep(true);
}
 
// 🛑 STOP RECORD
function stopRecording() {
  document.getElementById("light").style.background = "red";
 
  if (!mediaRecorder) return;
 
  mediaRecorder.stop();
 
  mediaRecorder.onstop = () => {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
 
    if (conn && conn.open) {
      conn.send(blob);
    }
 
    beep(false);
  };
}
 
// 🔔 BEEP SOUND
function beep(start) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
 
  osc.frequency.value = start ? 800 : 400;
  osc.connect(ctx.destination);
  osc.start();
 
  setTimeout(() => osc.stop(), 150);
}
 
// INIT
createPeer();
 
</script>
 
</body>
</html>
