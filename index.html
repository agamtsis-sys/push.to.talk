<!DOCTYPE html>
<html>
<head>
  <title>Walkie Talkie</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:50px;">
 
<h1>📡 Walkie Talkie</h1>
 
<h3>Your ID:</h3>
<p id="myid">Connecting...</p>
 
<h3>Status:</h3>
<p id="status">❌ Not connected</p>
 
<input id="customid" placeholder="Enter your ID (optional)" style="padding:10px;">
<button onclick="setID()">Set My ID</button>
 
<br><br>
 
<input id="connectid" placeholder="Enter other device ID" style="padding:10px;">
<button onclick="connect()">Connect</button>
 
<br><br><br>
 
<button 
  onmousedown="startTalking()" 
  onmouseup="stopTalking()"
  ontouchstart="startTalking()" 
  ontouchend="stopTalking()"
  style="padding:25px; font-size:20px; border-radius:10px;">
  🎤 HOLD TO TALK
</button>
 
<script>
let peer;
let conn;
let currentCall;
let stream;
 
// CREATE PEER (with optional custom ID)
function createPeer(id=null) {
  peer = new Peer(id);
 
  peer.on('open', id => {
    document.getElementById("myid").innerText = id;
  });
 
  // 🔥 CONNECTION RECEIVED
  peer.on('connection', connection => {
    conn = connection;
    document.getElementById("status").innerText = "✅ Connected";
  });
 
  // 🔊 RECEIVE AUDIO
  peer.on('call', call => {
    call.answer();
 
    call.on('stream', remoteStream => {
      let audio = new Audio();
      audio.srcObject = remoteStream;
      audio.play();
    });
  });
}
 
// SET CUSTOM ID
function setID() {
  let id = document.getElementById("customid").value;
  if (!id) {
    alert("Enter an ID!");
    return;
  }
 
  if (peer) peer.destroy(); // reset
 
  createPeer(id);
}
 
// CONNECT TO OTHER DEVICE
function connect() {
  let id = document.getElementById("connectid").value;
  if (!id) {
    alert("Enter other ID!");
    return;
  }
 
  conn = peer.connect(id);
 
  conn.on('open', () => {
    document.getElementById("status").innerText = "✅ Connected";
  });
}
 
// GET MIC
async function getMic() {
  if (!stream) {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }
}
 
// PUSH TO TALK START
async function startTalking() {
  let id = document.getElementById("connectid").value;
  if (!id) return;
 
  await getMic();
 
  currentCall = peer.call(id, stream);
}
 
// STOP TALKING
function stopTalking() {
  if (currentCall) currentCall.close();
}
 
// INIT DEFAULT
createPeer();
 
</script>
 
</body>
</html>
